<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>JS 基础知识练习</title>
    <style>
        body { font-family: Arial; line-height: 1.6; padding: 20px; max-width: 800px; margin: 0 auto; }
        .log-box { background: #f5f5f5; padding: 15px; border-radius: 5px; margin: 10px 0; font-family: Consolas; font-size: 14px; }
        h3 { color: #2c3e50; margin-top: 20px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
    </style>
</head>
<body>
    <h1>JavaScript 基础知识练习作业</h1>
    <div class="log-box" id="log"></div>

    <script>
        // 工具函数：把结果输出到页面，方便查看
        function log(msg) {
            const logDiv = document.getElementById('log');
            logDiv.innerHTML += msg + '<br>';
        }

        // ==============================================
        // 1. 变量的定义（var / let / const 的区别）
        // ==============================================
        log('<h3>1. 变量定义</h3>');
        var oldVar = "var 定义的变量（函数作用域，不推荐）";
        let userName = "小明同学";
        const PI = 3.1415926; // 常量，不可修改

        log(`var 变量：${oldVar}`);
        log(`let 变量：${userName}`);
        log(`const 常量：${PI}（不可修改）`);

        // ==============================================
        // 2. 变量类型（JS 基础数据类型）
        // ==============================================
        log('<h3>2. 变量类型</h3>');
        let str = "我是字符串类型";
        let num = 2026;
        let isPass = true;
        let nullValue = null;
        let undefinedValue;
        let obj = { name: "小红", age: 18 };
        let arr = [1, 2, 3, "数组元素"];

        log(`字符串：${str} → 类型：${typeof str}`);
        log(`数字：${num} → 类型：${typeof num}`);
        log(`布尔：${isPass} → 类型：${typeof isPass}`);
        log(`null：${nullValue} → 类型：${typeof nullValue}`);
        log(`undefined：${undefinedValue} → 类型：${typeof undefinedValue}`);
        log(`对象：${JSON.stringify(obj)} → 类型：${typeof obj}`);
        log(`数组：${arr} → 类型：${typeof arr}`);

        // ==============================================
        // 3. 表达式（算术/比较/逻辑）
        // ==============================================
        log('<h3>3. 表达式</h3>');
        let a = 10, b = 3;
        log(`a = ${a}, b = ${b}`);
        log(`算术运算：a + b = ${a + b} | a - b = ${a - b} | a * b = ${a * b} | a / b = ${a / b} | a % b = ${a % b}`);
        log(`比较运算：a > b → ${a > b} | a === 10 → ${a === 10} | "10" == 10 → ${"10" == 10} | "10" === 10 → ${"10" === 10}`);
        log(`逻辑运算：a > 5 && b < 5 → ${a > 5 && b < 5} | a < 5 || b > 5 → ${a < 5 || b > 5}`);

        // ==============================================
        // 4. 流程控制（分支 + 循环）
        // ==============================================
        log('<h3>4. 流程控制</h3>');
        // 分支：if-else
        let score = 88;
        if (score >= 90) {
            log(`分数 ${score} → 等级：优秀`);
        } else if (score >= 60) {
            log(`分数 ${score} → 等级：及格`);
        } else {
            log(`分数 ${score} → 等级：不及格`);
        }

        // 分支：switch
        let weekDay = 3;
        switch(weekDay) {
            case 1: log("今天是周一"); break;
            case 2: log("今天是周二"); break;
            case 3: log("今天是周三"); break;
            default: log("今天是其他日期");
        }

        // 循环：for 循环
        log("for 循环（1-5）：");
        for (let i = 1; i <= 5; i++) {
            log(i);
        }

        // 循环：while 循环
        log("while 循环（1-3）：");
        let count = 1;
        while (count <= 3) {
            log(count);
            count++;
        }

        // ==============================================
        // 5. 函数（普通/匿名/箭头/带默认参数）
        // ==============================================
        log('<h3>5. 函数</h3>');
        // 普通函数
        function add(x, y) {
            return x + y;
        }
        log(`普通函数 add(5,3) → ${add(5,3)}`);

        // 匿名函数（赋值给变量）
        const multiply = function(x, y) {
            return x * y;
        };
        log(`匿名函数 multiply(4,5) → ${multiply(4,5)}`);

        // 箭头函数
        const subtract = (x, y) => x - y;
        log(`箭头函数 subtract(10,4) → ${subtract(10,4)}`);

        // 带默认参数的函数
        function greet(name = "访客") {
            return `你好，${name}！`;
        }
        log(`带默认参数的函数 greet() → ${greet()}`);
        log(`带默认参数的函数 greet("同学") → ${greet("同学")}`);
    </script>
</body>
</html>
